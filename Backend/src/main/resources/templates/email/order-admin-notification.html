<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title th:text="${subject}">New order</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;-webkit-text-size-adjust:100%;">
  <span th:text="${preheader}" style="display:none!important;visibility:hidden;opacity:0;height:0;width:0;overflow:hidden;"></span>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f1f5f9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:600px;background-color:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
          <tr th:replace="~{email/fragments/shell :: header}"></tr>
          <tr>
            <td style="padding:36px 32px 28px;font-family:Arial,Helvetica,sans-serif;">
              <p style="margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#bd162c;">New order</p>
              <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;font-weight:700;color:#0f172a;">Order placed on website</h1>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#475569;">
                <strong th:text="${customerName}">Customer</strong> placed order
                <strong th:text="${orderNumber}">ORD-0000</strong> via
                <strong th:text="${paymentMethodLabel}">eSewa</strong>.
              </p>

              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:0 0 20px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;">
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;">Customer email</td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;font-size:14px;">
                    <a th:href="'mailto:' + ${customerEmail}" style="color:#bd162c;text-decoration:none;font-weight:600;" th:text="${customerEmail}">email</a>
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;">Phone</td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;font-size:14px;color:#0f172a;" th:text="${phone}">phone</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;font-size:12px;font-weight:700;color:#64748b;vertical-align:top;">Delivery address</td>
                  <td style="padding:12px 16px;font-size:14px;line-height:1.6;color:#0f172a;" th:text="${address}">address</td>
                </tr>
              </table>

              <h2 style="margin:0 0 12px;font-size:16px;font-weight:700;color:#0f172a;">Products ordered</h2>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:0 0 20px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;">
                <tr th:each="line : ${lines}">
                  <td style="padding:12px;border-bottom:1px solid #e2e8f0;width:64px;">
                    <img th:if="${line.imageUrl != null}" th:src="${line.imageUrl}" th:alt="${line.productName}" width="48" height="48"
                         style="display:block;width:48px;height:48px;object-fit:contain;border-radius:6px;border:1px solid #e2e8f0;" />
                  </td>
                  <td style="padding:12px 8px;border-bottom:1px solid #e2e8f0;font-size:14px;color:#0f172a;">
                    <span th:text="${line.productName}">Product</span>
                    · Qty <span th:text="${line.quantity}">1</span>
                    · <span th:text="${line.lineTotal}">Rs. 0</span>
                  </td>
                </tr>
                <tr>
                  <td colspan="2" style="padding:14px 16px;background-color:#f8fafc;font-size:15px;font-weight:700;color:#bd162c;text-align:right;" th:text="${total}">Rs. 0</td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;line-height:1.6;color:#64748b;">
                Expected delivery within 3 business days. Manage this order from the admin dashboard.
              </p>
            </td>
          </tr>
          <tr th:replace="~{email/fragments/shell :: footer}"></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
