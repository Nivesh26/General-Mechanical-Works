<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title th:text="${subject}">New contact message</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;-webkit-text-size-adjust:100%;">
  <span th:text="${preheader}" style="display:none!important;visibility:hidden;opacity:0;height:0;width:0;overflow:hidden;"></span>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f1f5f9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:560px;background-color:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
          <tr th:replace="~{email/fragments/shell :: header}"></tr>
          <tr>
            <td style="padding:36px 32px 28px;font-family:Arial,Helvetica,sans-serif;">
              <p style="margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#bd162c;">Contact form</p>
              <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;font-weight:700;color:#0f172a;">New message received</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#475569;">
                Someone submitted the contact form on your website. Reply directly to the sender using the email below.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:0 0 20px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;">
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;width:96px;">Name</td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;font-size:14px;color:#0f172a;" th:text="${senderName}">Name</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;">Phone</td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;font-size:14px;color:#0f172a;" th:text="${senderPhone}">Phone</td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;">Email</td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;font-size:14px;">
                    <a th:href="'mailto:' + ${senderEmail}" style="color:#bd162c;text-decoration:none;font-weight:600;" th:text="${senderEmail}">email</a>
                  </td>
                </tr>
                <tr>
                  <td colspan="2" style="padding:16px;background-color:#ffffff;">
                    <p style="margin:0 0 8px;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;">Message</p>
                    <p style="margin:0;font-size:15px;line-height:1.7;color:#334155;white-space:pre-wrap;" th:text="${messageBody}">Message body</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr th:replace="~{email/fragments/shell :: footer}"></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
