<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title th:text="${subject}">Welcome</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;-webkit-text-size-adjust:100%;">
  <span th:text="${preheader}" style="display:none!important;visibility:hidden;opacity:0;height:0;width:0;overflow:hidden;"></span>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f1f5f9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:560px;background-color:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
          <tr th:replace="~{email/fragments/shell :: header}"></tr>
          <tr>
            <td style="padding:36px 32px 28px;font-family:Arial,Helvetica,sans-serif;">
              <p style="margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#bd162c;">Welcome</p>
              <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;font-weight:700;color:#0f172a;">Glad to have you with us</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#475569;" th:text="${greeting}">Hi there,</p>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#475569;">
                Thank you for creating an account with <span th:text="${brandName}">General Mechanical Works</span>.
                You can now browse products, book services, track orders, and manage your profile anytime.
              </p>
              <table th:replace="~{email/fragments/shell :: ctaButton(${websiteUrl}, 'Explore our services')}"></table>
              <p style="margin:0;font-size:13px;line-height:1.6;color:#64748b;">
                Need help? Reply to this email or contact us through our website.
              </p>
            </td>
          </tr>
          <tr th:replace="~{email/fragments/shell :: footer}"></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
